# true color + undercurl passthrough for ghostty (so rose-pine renders correctly)
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB"
set -ga terminal-features ",xterm-ghostty:usstyle"

# forward focus events to nvim (autoread / focus-autosave / vim-tmux-navigator)
set -g focus-events on

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file
bind r source-file ~/.config/tmux/tmux.conf

# enable mouse mode
set -g mouse on

# status bar on top with transparent background
# set -g status-position top
# set -g status-style 'bg=default'

set-option -g allow-rename on

# start numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# bigger scrollback
set -g history-limit 50000

# vi-style copy mode (prefix + [ to enter; v to select, y to yank)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'sainnhe/tmux-fzf'      # fuzzy menus for sessions/windows/panes/etc (needs fzf)
set -g @plugin 'rose-pine/tmux'        # official rose-pine theme
set -g @plugin 'alexwforsythe/tmux-which-key'

# session persistence
set -g @resurrect-capture-pane-contents 'on'  # save scrollback/pane contents
set -g @resurrect-strategy-nvim 'session'     # restore nvim sessions if you use :mksession
set -g @continuum-restore 'off'               # DON'T auto-restore on server start (no revive). Reboot restore is manual: prefix + Ctrl-r. Auto-save below still runs.
set -g @continuum-save-interval '5'           # snapshot every 5 min so a reboot loses less (prefix + Ctrl-s to snapshot now)

# rose-pine status bar — minimal, transparent to match lualine
set -g @rose_pine_variant 'main'              # 'main', 'moon', or 'dawn'
set -g @rose_pine_bar_bg_disable 'on'         # transparent bar (blends with terminal bg)
set -g @rose_pine_host 'on'                   # show hostname (ssh context)
set -g @rose_pine_directory 'on'              # show current folder
set -g @rose_pine_date_time '%Y-%m-%d %H:%M'  # 24h clock

run '~/.config/tmux/plugins/tpm/tpm'
