set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB"
set -ga terminal-features ",xterm-ghostty:usstyle"

set -g focus-events on

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind r source-file ~/.config/tmux/tmux.conf

set -g mouse on

set -g status-position bottom

set-option -g allow-rename on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000 # scrollback history

# vim keybinds
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'     # restore nvim sessions if you use :mksession
set -g @continuum-restore 'off'               # manual reboot is prefix + C-r
set -g @continuum-save-interval '5'           # manual save is prefix + C-s

set -g @rose_pine_variant 'main'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_host 'on'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%Y-%m-%d %H:%M'  # 24h clock

run '~/.config/tmux/plugins/tpm/tpm'
