# true color + undercurl passthrough for ghostty (so kanagawa renders correctly)
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB"
set -ga terminal-features ",xterm-ghostty:usstyle"

# forward focus events to nvim (autoread / focus-autosave / vim-tmux-navigator)
set -g focus-events on

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file
bind r source-file ~/.config/tmux/tmux.conf

# enable mouse mode
set -g mouse on

# status bar on top with transparent background
# set -g status-position top
# set -g status-style 'bg=default'

set-option -g allow-rename on

# start numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# bigger scrollback
set -g history-limit 50000

# vi-style copy mode (prefix + [ to enter; v to select, y to yank)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'Nybkox/tmux-ukiyo'

# session persistence
set -g @resurrect-capture-pane-contents 'on'  # save scrollback/pane contents
set -g @resurrect-strategy-nvim 'session'     # restore nvim sessions if you use :mksession
set -g @continuum-restore 'on'                # auto-restore last session on tmux start
set -g @continuum-save-interval '15'          # auto-save every 15 minutes (default)

# kanagawa wave status bar — kept minimal to match lualine
set -g @ukiyo-theme 'kanagawa/wave'
set -g @ukiyo-plugins "git ssh-session time"
set -g @ukiyo-left-icon session
set -g @ukiyo-show-powerline true
set -g @ukiyo-show-flags true
set -g @ukiyo-military-time true

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

run '~/.config/tmux/plugins/tpm/tpm'
